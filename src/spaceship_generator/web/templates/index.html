{% extends "base.html" %}

{% macro tip(key) -%}
    {%- if param_help and key in param_help -%}
    <span class="tip" tabindex="0" role="button"
          aria-label="{{ param_help[key] }}"
          data-tip="{{ param_help[key] }}">?</span>
    {%- endif -%}
{%- endmacro %}

{% block content %}
<div class="layout">
    <form action="{{ url_for('do_generate') }}" method="POST" class="gen-form"
          hx-post="{{ url_for('do_generate') }}"
          hx-target="#result-panel"
          hx-swap="innerHTML"
          hx-indicator="#gen-indicator">
        {% if error %}
        <div class="error">Error: {{ error }}</div>
        {% endif %}

        <fieldset>
            <legend>Seed &amp; palette</legend>
            <label>Seed {{ tip("seed") }}
                <input type="number" id="seed" name="seed" value="{{ defaults.seed }}" required>
            </label>
            <button type="button" id="randomize-seed" class="btn secondary seed-random"
                    data-role="randomize-seed"
                    onclick="document.getElementById('seed').value = Math.floor(Math.random() * 2147483648);">
                Random seed
            </button>
            <label>Palette {{ tip("palette") }}
                <select name="palette">
                    <option value="random" {% if defaults.palette == "random" %}selected{% endif %}>
                        &#127922; random (seeded)
                    </option>
                    {% for p in palettes %}
                    <option value="{{ p }}" {% if p == defaults.palette %}selected{% endif %}>{{ p }}</option>
                    {% endfor %}
                </select>
            </label>
        </fieldset>

        <fieldset>
            <legend>Shape</legend>
            <label>Length (Z) {{ tip("length") }}
                <input type="number" name="length" min="8" max="128" value="{{ defaults.length }}" required>
            </label>
            <label>Max width (X) {{ tip("width") }}
                <input type="number" name="width" min="4" max="64" value="{{ defaults.width }}" required>
            </label>
            <label>Max height (Y) {{ tip("height") }}
                <input type="number" name="height" min="4" max="64" value="{{ defaults.height }}" required>
            </label>
            <label>Engines {{ tip("engines") }}
                <input type="number" name="engines" min="0" max="6" value="{{ defaults.engines }}" required>
            </label>
            <label>Wing probability {{ tip("wing_prob") }}
                <input type="number" name="wing_prob" step="0.05" min="0" max="1" value="{{ defaults.wing_prob }}">
            </label>
            <label>Greeble density {{ tip("greeble_density") }}
                <input type="number" name="greeble_density" step="0.01" min="0" max="0.5" value="{{ defaults.greeble_density }}">
            </label>
            <label>Cockpit style {{ tip("cockpit") }}
                <select name="cockpit">
                    {% for c in cockpit_styles %}
                    <option value="{{ c }}" {% if c == defaults.cockpit %}selected{% endif %}>{{ c }}</option>
                    {% endfor %}
                </select>
            </label>
        </fieldset>

        <fieldset>
            <legend>Texture</legend>
            <label>Window spacing (blocks) {{ tip("window_period") }}
                <input type="number" name="window_period" min="2" max="16" value="{{ defaults.window_period }}">
            </label>
            <label>Accent stripe period {{ tip("accent_stripe_period") }}
                <input type="number" name="accent_stripe_period" min="2" max="32" value="{{ defaults.accent_stripe_period }}">
            </label>
            <label>Engine glow depth {{ tip("engine_glow_depth") }}
                <input type="number" name="engine_glow_depth" min="1" max="8" value="{{ defaults.engine_glow_depth }}">
            </label>
            <label>Hull noise ratio (60-30-10) {{ tip("hull_noise_ratio") }}
                <input type="number" name="hull_noise_ratio" step="0.05" min="0" max="1"
                       value="{{ defaults.hull_noise_ratio }}">
            </label>
            <label>Panel line bands {{ tip("panel_line_bands") }}
                <input type="number" name="panel_line_bands" min="1" max="3"
                       value="{{ defaults.panel_line_bands }}">
            </label>
            <label>Rivet period (0 off) {{ tip("rivet_period") }}
                <input type="number" name="rivet_period" min="0" max="32"
                       value="{{ defaults.rivet_period }}">
            </label>
            <label class="checkbox">
                <input type="checkbox" name="engine_glow_ring" value="true"
                       {% if defaults.engine_glow_ring %}checked{% endif %}>
                Engine glow ring {{ tip("engine_glow_ring") }}
            </label>
        </fieldset>

        <button type="submit">Generate</button>
        <button type="button" id="randomize-all" class="btn secondary"
                data-role="randomize-all">
            Generate random ship
        </button>
        <div id="gen-indicator" class="progress-bar" role="progressbar"
             aria-label="Generating spaceship" aria-valuetext="Generating"
             aria-busy="true">
            <div class="progress-bar__track"></div>
        </div>
    </form>

    <script>
        // "Generate random ship": randomize every parameter within its
        // declared min/max (or option set), then submit the form. Submission
        // goes through HTMX because the form has hx-post, so the result
        // panel swaps in without a full page reload.
        (function () {
            "use strict";
            function randomizeAndSubmit() {
                var form = document.querySelector(".gen-form");
                if (!form) return;

                // Seed: full int32 range.
                if (form.seed) {
                    form.seed.value = Math.floor(Math.random() * 2147483648);
                }

                // Every <input type="number"> with min+max: sample uniformly
                // and round to the input's step precision.
                form.querySelectorAll('input[type="number"]').forEach(function (inp) {
                    if (inp.name === "seed") return;
                    var lo = parseFloat(inp.min);
                    var hi = parseFloat(inp.max);
                    if (!Number.isFinite(lo) || !Number.isFinite(hi) || hi <= lo) return;
                    var step = parseFloat(inp.step);
                    if (!Number.isFinite(step) || step <= 0) step = 1;
                    var v = lo + Math.random() * (hi - lo);
                    if (step >= 1) {
                        v = Math.round(v);
                    } else {
                        // Snap to step grid.
                        v = Math.round((v - lo) / step) * step + lo;
                        v = parseFloat(v.toFixed(4));
                    }
                    inp.value = String(v);
                });

                // Palette: pick any concrete palette (skip the 'random' meta-option
                // so the user actually sees a chosen palette name in the form).
                var pal = form.querySelector('select[name="palette"]');
                if (pal) {
                    var palOpts = Array.from(pal.options).filter(function (o) {
                        return o.value && o.value !== "random";
                    });
                    if (palOpts.length) {
                        pal.value = palOpts[Math.floor(Math.random() * palOpts.length)].value;
                    }
                }

                // Cockpit: uniform over available styles.
                var cockpit = form.querySelector('select[name="cockpit"]');
                if (cockpit && cockpit.options.length) {
                    var ci = Math.floor(Math.random() * cockpit.options.length);
                    cockpit.value = cockpit.options[ci].value;
                }

                // Engine glow ring: 50/50.
                var ring = form.querySelector('input[name="engine_glow_ring"]');
                if (ring) ring.checked = Math.random() < 0.5;

                // Submit. requestSubmit triggers both native and HTMX handlers.
                if (typeof form.requestSubmit === "function") {
                    form.requestSubmit();
                } else {
                    form.submit();
                }
            }

            document.addEventListener("DOMContentLoaded", function () {
                var btn = document.getElementById("randomize-all");
                if (btn) btn.addEventListener("click", randomizeAndSubmit);
            });
        })();
    </script>

    <aside id="result-panel" class="result-panel" aria-live="polite">
        <p class="placeholder">Generate a ship to see the preview &amp; block key here.</p>
    </aside>
</div>
{% endblock %}
