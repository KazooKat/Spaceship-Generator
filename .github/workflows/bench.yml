name: Perf bench

on:
  pull_request:
    paths:
      - "src/**"
      - "scripts/bench_generator.py"
      - "scripts/bench_compare.py"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bench-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    name: bench (py3.12 / ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            base/pyproject.toml
            head/pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install base project
        working-directory: base
        run: python -m pip install -e ".[dev]"

      - name: Run bench on base branch
        working-directory: base
        run: python scripts/bench_generator.py --n 12 --save /tmp/baseline.json

      - name: Install PR head project
        working-directory: head
        run: python -m pip install -e ".[dev]" --force-reinstall --no-deps

      - name: Run bench on PR head
        working-directory: head
        run: python scripts/bench_generator.py --n 12 --save /tmp/current.json

      - name: Compare baselines
        id: compare
        working-directory: head
        continue-on-error: true
        run: |
          python scripts/bench_compare.py /tmp/baseline.json /tmp/current.json \
            --threshold 0.10 | tee /tmp/bench_report.md

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/bench_report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body + '\n\n_GitHub-hosted runners have ~5-15% variance; treat single runs as informational._',
            });
